<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Interactive Tower Defense Simulator Mapper for Roblox. Plan tower placements, build strategies, visualize your defense and improve your gameplay with this free online mapping tool.">

<meta name="keywords"
      content="Tower Defense Simulator, Roblox, TDS, Mapper, Strategy Planner, Tower Placement, Maps, Roblox Tools">

<meta name="author"
      content="Kallly">

<meta name="robots"
      content="index, follow">

<meta name="viewport"
      content="width=device-width, initial-scale=1">
      <meta property="og:type" content="website">

<meta property="og:title"
      content="Tower Defense Simulator Mapper">

<meta property="og:description"
      content="Plan your Tower Defense Simulator strategies online with an interactive map editor.">

<meta property="og:url"
      content="https://kallly.github.io/Tower-Defense-Simulator-Mapper/">

<meta property="og:image"
      content="https://kallly.github.io/Tower-Defense-Simulator-Mapper/images/preview.png">
    <title>TDS Placement Editor</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <!-- ========================= -->
    <!-- Barre latérale -->
    <!-- ========================= -->

    <aside id="sidebar">

        <h2>Towers</h2>

        <input 
            id="troopSearch"
            type="text"
            placeholder="Rechercher une troupe..."
        >

        <div id="troopList">
        </div>

        <hr>

        <div class="panel">

            <label for="level">
                Niveau
            </label>

            <select id="level">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>

        </div>
        <div class="panel">

            <h3>Couleur des troupes</h3>
                
            <label for="troopColor">
                Couleur
            </label>
        
            <input 
                type="color"
                id="troopColor"
                value="#FFD54A"
            >
        
        </div>

        <div class="panel">

            <h3>Selected Tower</h3>

            <p>
                <b>Name :</b>
                <span id="selectedTroop">Aucune</span>
            </p>

            <p>
                <b>Range :</b>
                <span id="selectedRange">0</span>
            </p>
        </div>

        <hr>

        <div class="panel">
            <button id="toggleRange">
                Hide Ranges
            </button>

            <button id="deleteSelected">
                Delete Tower
            </button>

            <button id="clearMap">
                Clear Map
            </button>

            <button id="saveMap">
                Save JSON
            </button>

            <button id="loadMap">
                Load JSON
            </button>

        </div>

        <textarea
            id="jsonArea"
            placeholder="The JSON save data will appear here..."
        ></textarea>

    </aside>

    <!-- ========================= -->
    <!-- Zone principale -->
    <!-- ========================= -->

    <main id="main">

        <div id="topbar">
        <select id="mapSelect">
        </select>
        </div>

        <canvas
            id="gameCanvas">
        </canvas>

    </main>

</div>


<!-- ========================= -->
<!-- Logique principale -->
<!-- ========================= -->

<script src="data/maps.js"></script>
<script src="script.js"></script>

</body>
</html>
